<!DOCTYPE html>
<html>
<head>
<title>Device Tracker Pro</title>

<style>
body { font-family: Arial; background:#f1f5f9; }
h1 { background:#0f172a; color:#fff; padding:15px; text-align:center; }

.controls {
  text-align:center;
  margin:15px;
}

input, button {
  padding:8px;
  margin:5px;
}

table {
  width:95%;
  margin:auto;
  background:white;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th { background:#1e293b; color:white; }

.assigned { color:green; font-weight:bold; }
</style>
</head>

<body>

<h1>📊 Device Tracker Pro</h1>

<div class="controls">
  🔍 <input type="text" id="search" placeholder="Search employee/device">
  
  📅 <input type="date" id="start">
  📅 <input type="date" id="end">
  
  <button onclick="loadHistory()">Filter</button>
  <button onclick="exportCSV()">Export CSV</button>
</div>

<h2>📱 Active Devices</h2>
<table>
<thead>
<tr><th>Device</th><th>Employee</th><th>Status</th></tr>
</thead>
<tbody id="deviceTable"></tbody>
</table>

<h2>📜 History</h2>
<table>
<thead>
<tr>
<th>Device</th>
<th>Employee</th>
<th>Login</th>
<th>Logout</th>
<th>Usage</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

<script>
const BASE = "https://device-tracker-eu6f.onrender.com";

setInterval(loadAll, 5000);
loadAll();

function loadAll() {
  loadDevices();
  loadHistory();
}

// ================= DEVICES =================
async function loadDevices() {
  const res = await fetch(BASE + "/devices");
  const data = await res.json();

  let html = "";
  data.forEach(d => {
    html += `
    <tr>
      <td>${d.device_name}</td>
      <td>${d.employee_name}</td>
      <td class="assigned">${d.status}</td>
    </tr>`;
  });

  document.getElementById("deviceTable").innerHTML = html;
}

// ================= HISTORY =================
async function loadHistory() {
  const search = document.getElementById("search").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  let url = BASE + "/history?";
  if (search) url += `search=${search}&`;
  if (start && end) url += `start=${start}&end=${end}`;

  const res = await fetch(url);
  const data = await res.json();

  let html = "";
  data.forEach(d => {
    html += `
    <tr>
      <td>${d.device_name}</td>
      <td>${d.employee_name}</td>
      <td>${format(d.login_time)}</td>
      <td>${d.logout_time ? format(d.logout_time) : "-"}</td>
      <td>${d.usage}</td>
    </tr>`;
  });

  document.getElementById("historyTable").innerHTML = html;
}

// ================= EXPORT =================
function exportCSV() {
  window.open(BASE + "/export");
}

// ================= FORMAT =================
function format(date) {
  return new Date(date).toLocaleString();
}
</script>

</body>
</html>
