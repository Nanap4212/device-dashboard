<!DOCTYPE html>
<html>
<head>
<title>Device Tracker Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f1f5f9; margin:0; }

h1 {
  background:#0f172a;
  color:#fff;
  padding:15px;
  text-align:center;
  margin:0;
}

.controls {
  text-align:center;
  margin:15px;
}

input, button {
  padding:8px;
  margin:5px;
}

table {
  width:95%;
  margin:20px auto;
  background:white;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th { background:#1e293b; color:white; }

.assigned { color:green; font-weight:bold; }
.notuse { color:#dc2626; font-weight:bold; }

h2 { margin-left:20px; }

/* QR Modal */
#qrModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#qrModal div {
  background:white;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>📊 Device Tracker Pro</h1>

<h2>📱 Active Devices</h2>
<table>
<thead>
<tr>
  <th>Device</th>
  <th>Employee</th>
  <th>Status</th>
  <th>QR</th>
</tr>
</thead>
<tbody id="deviceTable"></tbody>
</table>

<div class="controls">
  🔍 <input type="text" id="search" placeholder="Search employee/device">
  
  📅 <input type="date" id="start">
  📅 <input type="date" id="end">
  
  <button onclick="loadHistory()">Filter</button>
  <button onclick="exportCSV()">Export CSV</button>
</div>

<h2>📜 History</h2>
<table>
<thead>
<tr>
<th>Device</th>
<th>Employee</th>
<th>Login</th>
<th>Logout</th>
<th>Usage</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

<!-- QR POPUP -->
<div id="qrModal" onclick="closeQR()">
  <div id="qrBig"></div>
</div>

<script>
const BASE = "https://device-tracker-eu6f.onrender.com";

setInterval(loadAll, 5000);
loadAll();

function loadAll() {
  loadDevices();
  loadHistory();
}

// ================= DEVICES =================
async function loadDevices() {
  try {
    const res = await fetch(BASE + "/devices");
    const data = await res.json();

    let html = "";

    data.forEach((d, index) => {
      html += `
      <tr>
        <td>${d.device_name}</td>
        <td>${d.employee_name || "-"}</td>
        <td class="${d.status === "ASSIGNED" ? "assigned" : "notuse"}">
          ${d.status}
        </td>
        <td>
          <div id="qr${index}" style="cursor:pointer"></div>
        </td>
      </tr>`;
    });

    document.getElementById("deviceTable").innerHTML = html;

    // Generate QR
    data.forEach((d, index) => {
      const qrDiv = document.getElementById("qr" + index);

      new QRCode(qrDiv, {
        text: d.device_id, // 🔥 IMPORTANT
        width: 60,
        height: 60
      });

      // Click event → show big QR
      qrDiv.onclick = () => showQR(d.device_id);
    });

  } catch (err) {
    console.log("Device Error:", err);
  }
}

// ================= HISTORY =================
async function loadHistory() {
  try {
    const search = document.getElementById("search").value;
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    let url = BASE + "/history?";
    if (search) url += `search=${search}&`;
    if (start && end) url += `start=${start}&end=${end}`;

    const res = await fetch(url);
    const data = await res.json();

    let html = "";

    data.forEach(d => {
      html += `
      <tr>
        <td>${d.device_name}</td>
        <td>${d.employee_name}</td>
        <td>${format(d.login_time)}</td>
        <td>${d.logout_time ? format(d.logout_time) : "-"}</td>
        <td>${d.usage}</td>
      </tr>`;
    });

    document.getElementById("historyTable").innerHTML = html;

  } catch (err) {
    console.log("History Error:", err);
  }
}

// ================= EXPORT =================
function exportCSV() {
  window.open(BASE + "/export");
}

// ================= QR POPUP =================
function showQR(deviceId) {
  const modal = document.getElementById("qrModal");
  const qrDiv = document.getElementById("qrBig");

  qrDiv.innerHTML = "";

  new QRCode(qrDiv, {
    text: deviceId,
    width: 200,
    height: 200
  });

  modal.style.display = "flex";
}

function closeQR() {
  document.getElementById("qrModal").style.display = "none";
}

// ================= FORMAT =================
function format(date) {
  return new Date(date).toLocaleString();
}
</script>

</body>
</html>
