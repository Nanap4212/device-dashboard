<!DOCTYPE html>
<html>
<head>
<title>Device Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#f1f5f9; }
h1 { background:#0f172a; color:#fff; padding:15px; text-align:center; }

table { width:95%; margin:auto; background:white; border-collapse: collapse; }
th, td { padding:10px; border:1px solid #ddd; text-align:center; }
th { background:#1e293b; color:white; }

.notuse { color:red; font-weight:bold; }
.assigned { color:green; font-weight:bold; }

.controls { text-align:center; margin:15px; }

button {
  padding:5px 10px;
  margin:2px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.ring { background:green; color:white; }
.stop { background:red; color:white; }
</style>
</head>

<body>

<h1>📊 Device Tracker</h1>

<h2>📱 Devices</h2>
<table>
<thead>
<tr>
  <th>Device</th>
  <th>Employee</th>
  <th>Status</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="deviceTable"></tbody>
</table>

<div class="controls">
<input id="search" placeholder="Search">
<input type="date" id="start">
<input type="date" id="end">
<button onclick="loadHistory()">Filter</button>
<button onclick="exportCSV()">Export</button>
</div>

<h2>📜 History</h2>
<table>
<thead>
<tr>
<th>Device</th><th>Employee</th><th>Login</th><th>Logout</th><th>Usage</th>
</tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

<!-- QR MODAL -->
<div id="qrModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;justify-content:center;align-items:center;">
<div style="background:white;padding:20px;text-align:center;">
<h3 id="qrTitle"></h3>
<canvas id="qrCanvas"></canvas>
<br><br>
<button onclick="closeQR()">Close</button>
</div>
</div>

<script>
const BASE = "https://device-tracker-eu6f.onrender.com";

setInterval(loadAll, 5000);
loadAll();

function loadAll() {
  loadDevices();
  loadHistory();
}

// ================= DEVICES =================
async function loadDevices() {
  const res = await fetch(BASE + "/devices");
  const data = await res.json();

  let html = "";

  data.forEach(d => {
    html += `
    <tr>
      <td onclick="showQR('${d.device_id}','${d.device_name}')"
          style="cursor:pointer;color:blue;">
        ${d.device_name}
      </td>
      <td>${d.employee_name || "-"}</td>
      <td class="${d.status === "ASSIGNED" ? "assigned":"notuse"}">
        ${d.status}
      </td>
      <td>
        <button class="ring" onclick="ringDevice('${d.device_id}')">🔊 Ring</button>
        <button class="stop" onclick="stopRing('${d.device_id}')">🛑 Stop</button>
      </td>
    </tr>`;
  });

  document.getElementById("deviceTable").innerHTML = html;
}

// ================= HISTORY =================
async function loadHistory() {
  const search = document.getElementById("search").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  let url = BASE + "/history?";
  if (search) url += `search=${search}&`;
  if (start && end) url += `start=${start}&end=${end}`;

  const res = await fetch(url);
  const data = await res.json();

  let html = "";

  data.forEach(d => {
    html += `
    <tr>
      <td>${d.device_name}</td>
      <td>${d.employee_name}</td>
      <td>${format(d.login_time)}</td>
      <td>${d.logout_time ? format(d.logout_time) : "-"}</td>
      <td>${d.usage}</td>
    </tr>`;
  });

  document.getElementById("historyTable").innerHTML = html;
}

// ================= QR =================
function showQR(id, name) {
  document.getElementById("qrModal").style.display = "flex";
  document.getElementById("qrTitle").innerText = name;
  QRCode.toCanvas(document.getElementById("qrCanvas"), "device_id:" + id);
}

function closeQR() {
  document.getElementById("qrModal").style.display = "none";
}

// ================= EXPORT =================
function exportCSV() {
  window.open(BASE + "/export");
}

// ================= RING =================
async function ringDevice(id) {
  await fetch(BASE + "/ring-device", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ device_id: id })
  });

  alert("🔊 Ring command sent");
}

// ================= STOP =================
async function stopRing(id) {
  await fetch(BASE + "/stop-ring", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ device_id: id })
  });

  alert("🛑 Stop command sent");
}

function format(date) {
  return new Date(date).toLocaleString();
}
</script>

</body>
</html>
